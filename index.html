<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Mods & Datapacks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #f1f5f9; text-align: center; margin-bottom: 10px; font-size: 2.5em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { color: #94a3b8; text-align: center; margin-bottom: 40px; font-size: 1.1em; }
        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .tab { background: #1e293b; color: #94a3b8; border: 2px solid #334155; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 500; transition: all 0.3s; }
        .tab:hover { border-color: #667eea; color: #e2e8f0; }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: transparent; }
        .stats { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #f1f5f9; }
        .stat-label { color: #94a3b8; font-size: 0.9em; margin-top: 5px; }
        .search-box { margin-bottom: 30px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .search-box input { padding: 12px 20px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; border-radius: 8px; font-size: 1em; min-width: 250px; }
        .search-box input:focus { outline: none; border-color: #667eea; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .item-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; transition: all 0.2s; display: flex; flex-direction: column; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3); border-color: #667eea; }
        .item-icon { width: 100%; height: 200px; object-fit: cover; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .item-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .item-title { font-size: 1.3em; font-weight: 600; margin-bottom: 10px; color: #f1f5f9; }
        .item-badge { display: inline-block; padding: 4px 10px; margin-bottom: 10px; border-radius: 4px; font-size: 0.75em; font-weight: 600; margin-right: 5px; width: fit-content; }
        .badge-hash { background: #10b981; color: white; }
        .item-description { color: #94a3b8; margin-bottom: 15px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.95em; }
        .item-categories { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .category-tag { background: #334155; color: #94a3b8; padding: 4px 10px; border-radius: 12px; font-size: 0.8em; }
        .item-loaders { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .loader-tag { background: #2d3748; color: #cbd5e0; padding: 3px 8px; border-radius: 4px; font-size: 0.75em; }
        .item-actions { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
        .item-link { display: inline-block; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
        .item-link:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Minecraft Mods & Datapacks</h1>
        <p class="subtitle">Identificazione basata su Hash • API Modrinth</p>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('mods')">
                🔧 Mods (<span id="mod-count">0</span>)
            </button>
        </div>
        
        <div id="mods-section" class="content-section active">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">Mod Totali</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-matched">0</div>
                    <div class="stat-label">Corrispondenze Hash ✅</div>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="mods-search" placeholder="Cerca mod..." onkeyup="filterItems()">
            </div>
            
            <!-- Il contenuto verrà generato automaticamente qui -->
            <div class="items-grid" id="mods-grid"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // ✏️ EDITARE QUI SOTTO PER MODIFICARE LA LISTA 
        // ==========================================
        const modsData = [
            {
                name: "Concurrent Chunk Management Engine",
                searchId: "concurrent chunk management engine (fabric)",
                image: "https://cdn.modrinth.com/data/VSNURh3q/3c2ce471054466712a44c8758a03e03bb868f93b_96.webp",
                description: "Una mod per Fabric progettata per migliorare le prestazioni dei chunk in Minecraft.",
                loaders: ["fabric"],
                categories: ["ottimizzazione"],
                link: "https://modrinth.com/mod/c2me-fabric"
            },
            {
                name: "EasyEconomy (EzEconomy)",
                searchId: "easyeconomy",
                image: "https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon",
                description: "Una semplice economia basata sui diamanti, con bal e auc",
                loaders: ["fabric"],
                categories: ["economia"],
                link: "https://modrinth.com/plugin/ezeconomy"
            },
            {
                name: "Explorify",
                searchId: "explorify",
                image: "https://cdn.modrinth.com/data/HSfsxuTo/e036a417f857abd937326db5c131296ad88bad5b_96.webp",
                description: "Una collezione semplice di nuove strutture in stile vanilla.",
                loaders: ["fabric", "forge"],
                categories: ["generazione mondo"],
                link: "https://modrinth.com/mod/explorify"
            },
            {
                name: "Fabric API",
                searchId: "fabric api",
                image: "https://cdn.modrinth.com/data/P7dR8mSH/icon.png",
                description: "API leggera e modulare che fornisce hook comuni e misure di intercompatibilità.",
                loaders: ["fabric"],
                categories: ["libreria"],
                link: "https://modrinth.com/mod/fabric-api"
            },
            {
                name: "FerriteCore",
                searchId: "ferritecore",
                image: "https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon",
                description: "Ottimizzazioni dell'utilizzo della memoria.",
                loaders: ["fabric", "forge", "neoforge"],
                categories: ["ottimizzazione"],
                link: "https://modrinth.com/mod/ferrite-core"
            },
            {
                name: "Image2Map",
                searchId: "image2map",
                image: "https://cdn.modrinth.com/data/13RpG7dA/501cb456e7a651d84b489047ed51aa42234b14b9_96.webp",
                description: "Trasforma le immagini in mappe!",
                loaders: ["fabric", "quilt"],
                categories: ["utilità"],
                link: "https://modrinth.com/mod/image2map"
            },
            {
                name: "Lithium",
                searchId: "lithium",
                image: "https://cdn.modrinth.com/data/gvQqBUqZ/bcc8686c13af0143adf4285d741256af824f70b7_96.webp",
                description: "Mod di ottimizzazione della logica di gioco senza compromessi. Adatta per client e server di tutti i tipi.",
                loaders: ["fabric", "neoforge"],
                categories: ["ottimizzazione"],
                link: "https://modrinth.com/mod/lithium"
            },
            {
                name: "Login System (EasyLogin)",
                searchId: "login system",
                image: "https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon",
                description: "L'autenticazione lato server definitiva.",
                loaders: ["fabric", "forge"],
                categories: ["utilità"],
                link: "https://modrinth.com/mod/easylogin"
            },
            {
                name: "LuckPerms",
                searchId: "luckperms",
                image: "https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon",
                description: "Un plugin/mod per la gestione dei permessi nei server di Minecraft.",
                loaders: ["fabric", "forge", "paper"],
                categories: ["gestione"],
                link: "https://modrinth.com/plugin/luckperms"
            },
            {
                name: "Mineable Spawner",
                searchId: "mineable spawner",
                image: "https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon",
                description: "Mina i generatori di mostri (spawner) con un piccone (lasciano cadere anche le uova di generazione!).",
                loaders: ["datapack"],
                categories: ["meccaniche"],
                link: "https://modrinth.com/datapack/mineable-spawner"
            },
            {
                name: "Phytons Hearts",
                searchId: "phytons hearts",
                image: "https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon",
                description: "Oggetti per la sopravvivenza che aggiungono o rimuovono cuori e salute in modo permanente!",
                loaders: ["datapack"],
                categories: ["meccaniche"],
                link: "https://modrinth.com/datapack/phytons-hearts"
            },
            {
                name: "Polymer",
                searchId: "polymer",
                image: "https://cdn.modrinth.com/data/xGdtZczs/icon.png",
                description: "Libreria per creare migliori contenuti lato server!",
                loaders: ["fabric", "quilt"],
                categories: ["libreria"],
                link: "https://modrinth.com/mod/polymer"
            },
            {
                name: "SkinRestorer",
                searchId: "skinrestorer",
                image: "https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon",
                description: "Una mod lato server per gestire e ripristinare le skin dei giocatori.",
                loaders: ["fabric", "forge"],
                categories: ["utilità"],
                link: "https://modrinth.com/mod/skinrestorer"
            },
            {
                name: "Universal Graves",
                searchId: "universal graves",
                image: "https://cdn.modrinth.com/data/yn9u3ypm/a933032aa191fdc43cd439074f5713f8351e7af9.png",
                description: "Mod per tombe personalizzabili per Fabric!",
                loaders: ["fabric"],
                categories: ["utilità"],
                link: "https://modrinth.com/mod/universal-graves"
            }
        ];
        // ==========================================
        // FINE DELLA SEZIONE DA EDITARE
        // ==========================================

        // Funzione per generare l'HTML
        function renderMods() {
            const grid = document.getElementById('mods-grid');
            grid.innerHTML = ''; // Pulisce la griglia
            
            // Aggiorna i contatori
            document.getElementById('mod-count').textContent = modsData.length;
            document.getElementById('stat-total').textContent = modsData.length;
            document.getElementById('stat-matched').textContent = modsData.length;

            modsData.forEach(mod => {
                // Genera i badge per loaders e categorie
                const loadersHTML = mod.loaders.map(loader => `<span class="loader-tag">${loader}</span>`).join('');
                const categoriesHTML = mod.categories.map(cat => `<span class="category-tag">${cat}</span>`).join('');

                // Crea la card
                const card = `
                    <div class="item-card" data-name="${mod.searchId}">
                        <img src="${mod.image}" alt="${mod.name}" class="item-icon" onerror="this.src='https://via.placeholder.com/300x200/1e293b/667eea?text=No+Icon'">
                        <div class="item-content">
                            <span class="item-badge badge-hash">✅ Hash Match</span>
                            <h2 class="item-title">${mod.name}</h2>
                            <p class="item-description">${mod.description}</p>
                            <div class="item-loaders">${loadersHTML}</div>
                            <div class="item-categories">${categoriesHTML}</div>
                            <div class="item-actions">
                                <a href="${mod.link}" target="_blank" class="item-link">Visualizza su Modrinth</a>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // Funzione di ricerca
        function filterItems() {
            const searchInput = document.getElementById('mods-search').value.toLowerCase();
            const cards = document.querySelectorAll('.item-card');

            cards.forEach(card => {
                const searchId = card.getAttribute('data-name');
                if (searchId.includes(searchInput)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // Renderizza all'avvio
        renderMods();
    </script>
</body>
</html>
